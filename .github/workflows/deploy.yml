name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ─── ШАГ 1: Показать список изменений ──────────────────────────────────────
  summarize:
    name: Список изменений
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.log.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Сформировать список коммитов
        id: log
        run: |
          # Берём коммиты с прошлого деплоя (или последние 10)
          PREV=$(git log --skip=1 --format="%H" -1 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            LOG=$(git log ${PREV}..HEAD --pretty=format:"• %s (%an)" | head -20)
          else
            LOG=$(git log -10 --pretty=format:"• %s (%an)")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Вывести изменения в лог
        run: |
          echo "============================================"
          echo "  Изменения в этом релизе:"
          echo "============================================"
          git log -10 --pretty=format:"  • %s (%an, %ar)" 
          echo ""
          echo "============================================"
          echo "  Ожидание одобрения в GitHub Environments"
          echo "============================================"

  # ─── ШАГ 2: Запросить одобрение и задеплоить ───────────────────────────────
  deploy:
    name: Деплой на сервер
    runs-on: ubuntu-latest
    needs: summarize
    environment:
      name: production
      url: https://hex.aliterra.space
    steps:
      - uses: actions/checkout@v4

      - name: Подключиться к VPS и обновить
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /root/nexex

            echo "=== git sync ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== установка ADMIN_PASSWORD ==="
            HASH='$2b$12$KaZD8ignMUIPJ7pXoJ9Vp.nq9GXv8S9ybJ07TQV4rlBIobgLS3U8O'
            if grep -q "^ADMIN_PASSWORD=" .env 2>/dev/null; then
              sed -i "s|^ADMIN_PASSWORD=.*|ADMIN_PASSWORD=$HASH|" .env
              echo "ADMIN_PASSWORD обновлён"
            else
              echo "ADMIN_PASSWORD=$HASH" >> .env
              echo "ADMIN_PASSWORD добавлен"
            fi

            echo "=== загрузка переменных из .env ==="
            set -a
            source .env
            set +a

            echo "=== миграция БД ==="
            pnpm --filter @workspace/db run push

            echo "=== сборка API ==="
            pnpm --filter @workspace/api-server run build

            echo "=== копирование логотипа ==="
            if [ -f /root/nexex/logo.png ]; then
              cp /root/nexex/logo.png /root/nexex/artifacts/cex-exchange/dist/public/logo.png
              echo "logo.png скопирован"
            fi

            echo "=== перезапуск PM2 с обновлением env ==="
            pm2 restart nexex --update-env

            echo "=== готово ==="
            pm2 status nexex
