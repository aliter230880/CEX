name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/.gitkeep-dist'

jobs:
  # ─── ШАГ 1: Показать список изменений ──────────────────────────────────────
  summarize:
    name: Список изменений
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.log.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Сформировать список коммитов
        id: log
        run: |
          PREV=$(git log --skip=1 --format="%H" -1 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            LOG=$(git log ${PREV}..HEAD --pretty=format:"• %s (%an)" | head -20)
          else
            LOG=$(git log -10 --pretty=format:"• %s (%an)")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Вывести изменения в лог
        run: |
          echo "============================================"
          echo "  Изменения в этом релизе:"
          echo "============================================"
          git log -10 --pretty=format:"  • %s (%an, %ar)"
          echo ""
          echo "============================================"
          echo "  Ожидание одобрения в GitHub Environments"
          echo "============================================"

  # ─── ШАГ 2: Собрать фронтенд на CI и задеплоить ───────────────────────────
  build-and-deploy:
    name: Сборка и деплой
    runs-on: ubuntu-latest
    needs: summarize
    permissions:
      contents: write
    environment:
      name: production
      url: https://hex.aliterra.space
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Установить зависимости
        run: pnpm install --frozen-lockfile

      - name: Собрать фронтенд (Vite)
        run: pnpm --filter @workspace/cex-exchange run build

      - name: Закоммитить собранный фронтенд в репо
        run: |
          git config user.email "ci@atex.exchange"
          git config user.name "ATEX CI"
          # Принудительно добавляем dist (даже если в .gitignore)
          git add -f artifacts/cex-exchange/dist/
          # Коммитим только если есть изменения; [skip ci] — не триггерит новый деплой
          if git diff --staged --quiet; then
            echo "Фронтенд не изменился, коммит не нужен"
          else
            git commit -m "ci: pre-built frontend dist [skip ci]"
            git push origin main
          fi

      - name: Деплой на сервер (git pull + API build + PM2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 15m
          script: |
            set -e
            cd /root/nexex

            echo "=== git sync (включая готовый dist фронтенда) ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== установка ADMIN_PASSWORD ==="
            HASH='$2b$12$KaZD8ignMUIPJ7pXoJ9Vp.nq9GXv8S9ybJ07TQV4rlBIobgLS3U8O'
            if grep -q "^ADMIN_PASSWORD=" .env 2>/dev/null; then
              sed -i "s|^ADMIN_PASSWORD=.*|ADMIN_PASSWORD=$HASH|" .env
            else
              echo "ADMIN_PASSWORD=$HASH" >> .env
            fi

            echo "=== миграция БД ==="
            DATABASE_URL=$(grep '^DATABASE_URL=' .env | head -1 | cut -d'=' -f2-)
            export DATABASE_URL
            pnpm --filter @workspace/db run push

            echo "=== сборка API (быстро) ==="
            pnpm --filter @workspace/api-server run build

            echo "=== копирование логотипа ==="
            if [ -f /root/nexex/logo.png ]; then
              cp /root/nexex/logo.png /root/nexex/artifacts/cex-exchange/dist/public/logo.png
              echo "logo.png скопирован"
            fi

            echo "=== перезапуск PM2 ==="
            pm2 restart nexex

            echo "=== готово ==="
            pm2 status nexex
