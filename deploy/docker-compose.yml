version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: nexex
      POSTGRES_USER: nexex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro   # runs SQL init scripts on first start
    networks:
      - nexex_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexex -d nexex"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://nexex:${POSTGRES_PASSWORD}@postgres:5432/nexex
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      WALLET_MNEMONIC: ${WALLET_MNEMONIC}
      HOT_WALLET_PRIVATE_KEY: ${HOT_WALLET_PRIVATE_KEY}
      FRONTEND_DIST: /app/public
    networks:
      - nexex_net
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - nexex_net

volumes:
  postgres_data:

networks:
  nexex_net:
    driver: bridge
