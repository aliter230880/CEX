kind = "web"
previewPath = "/"
title = "CEX Exchange"
version = "1.0.0"
id = "artifacts/cex-exchange"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21573

[services.development]
run = "pnpm --filter @workspace/cex-exchange run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cex-exchange", "run", "build" ]
publicDir = "artifacts/cex-exchange/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21573"
BASE_PATH = "/"
